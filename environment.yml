name: quantised-encoder

channels:
  - conda-forge
  - bioconda

channel_priority: strict

dependencies:
  - python=3.10
  - nextflow      # pipeline orchestration
  - mmseqs2       # PREP: sequence clustering
  - wandb         # experiment logging
  - numpy         # core.py metrics (also a torch transitive dep)
  - procps-ng     # `ps` -- Nextflow needs it for task resource metrics
  # torch + transformers (distillation teacher) are pip-installed in the Dockerfile
